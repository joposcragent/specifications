openapi: 3.1.0
info:
  title: Оркестратор Celery (celery-orchestrator)
  description: |
    REST API сервиса инкапсуляции работы с брокером Celery (Redis) и учёта оркестрационных задач пайплайна сбора и оценки вакансий (Joposcragent). \
    Поведение процесса описано в юзкейсе UC-02 «Оркестрация процесса»; выбор Celery обоснован в ADR-003.

    REST API предназначен только для публикации задач в очередях, а непосредственно работу с задачами выполняет celery worker
  version: 2.0.0
servers:
  - url: http://celery-orchestrator:8080/
  - url: http://localhost:8084/

tags:
  - name: queue-broker
    description: Отправка доменных сообщений в очереди Celery (постановка задач брокеру)
  - name: tasks
    description: Работа с оркестрационными задачами

paths:
  /events-queue/progress:
    post:
      tags:
        - queue-broker
      description: Событие, содержащее прогресс выполнение ранее запущенной асинхронной задачи
      requestBody: 
        required: true
        content: 
          application/json: 
            schema: 
              $ref: '#/components/schemas/EventInputData'
      responses:
        "204":
          description: Сообщение принято и передано брокеру (тело ответа пустое)
        "500":
          $ref: "#/components/responses/UncaughtException"
  /events-queue/finish:
    post:
      tags:
        - queue-broker
      description: Событие окончания выполнения ранее запущенной асинхронной задачи
      requestBody: 
        required: true
        content: 
          application/json: 
            schema: 
              $ref: '#/components/schemas/FinishEventInputData'
      responses:
        "204":
          description: Сообщение принято и передано брокеру (тело ответа пустое)
        "500":
          $ref: "#/components/responses/UncaughtException"
  /events-queue/{eventName}:
    post:
      description: Ставит в очередь задачу `{eventName}`
      tags:
        - queue-broker
      parameters: 
        - name: eventName
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/EventName'
      requestBody: 
        required: true
        content: 
          application/json: 
            schema: 
              $ref: '#/components/schemas/EventInputData'
      responses:
        "204":
          description: Сообщение принято и передано брокеру (тело ответа пустое)
        "500":
          $ref: "#/components/responses/UncaughtException"              
  /tasks/{taskUuid}:
    get:
      tags:
        - tasks
      description: Получение текущего состояния оркестрационной задачи по UUID (визуализация и диагностика).
      parameters:
        - $ref: "#/components/parameters/TaskUuid"
      responses:
        "200":
          description: Задача найдена
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrchestrationTaskView"
        "404":
          description: Задача не найдена
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/UncaughtException"
  /tasks/{taskUuid}/children:
    get:
      tags:
        - tasks
      description: Получение списка дочерних задач оркестрационной задачи
      parameters:
        - $ref: "#/components/parameters/TaskUuid"
      responses:
        "200":
          description: Список дочерних задач найден
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/OrchestrationTaskView"
        "404":
          description: Задача не найдена
          content:
            text/plain:
              schema:
                type: string
        "500":
          $ref: "#/components/responses/UncaughtException"
components:
  parameters:
    TaskUuid:
      name: taskUuid
      in: path
      description: UUID оркестрационной задачи
      required: true
      schema:
        type: string
        format: uuid

  responses:      
    UncaughtException:
      description: Необработанное исключение
      content:
        text/plain:
          schema:
            type: string
          example: "redis.exceptions.ConnectionError: Error connecting to localhost:6379"

  schemas:
    EventInputData:
      type: object
      description: Данные о прогрессе выполнения асинхронной задачи
      properties: 
        correlationId:
          description: uuid асинхронной задачи, прогресс которой содержится в executionLog и data
          type: string
          format: uuid
        createdAt:
          description: Момент возникновения события
          type: string
          format: date-time
        executionLog:
          description: Текстовый лог исполнения
          type: string
      required: 
        - correlationId
        - createdAt
      additionalProperties: true
      
    FinishEventInputData:
      type: object
      description: Сведения о завершении выполнения асинхронной задачи
      properties: 
        correlationId:
          description: uuid асинхронной задачи, прогресс которой содержится в executionLog и data
          type: string
          format: uuid
        status:
          $ref: '#/components/schemas/FinishEventStatus'
        createdAt:
          description: Момент возникновения события
          type: string
          format: date-time
        executionLog:
          description: Текстовый лог исполнения
          type: string
        result:
          description: Произвольные данные, специфичные для задачи, которые передает исполнитель, записываются в Result задачи, найденной correlationId
          type: object
          additionalProperties: true
      required: 
        - correlationId
        - createdAt
        - status
      additionalProperties: true
        
    FinishEventStatus:
      type: string
      description: Терминальный статус при завершении асинхронной задачи
      enum:
        - SUCCEEDED
        - FAILED
        - CANCELLED
    EventName:
      type: string
      enum:
        - collection-batch
        - collection-query
        - evaluation
        - notification
    OrchestrationTaskView:
      type: object
      description: Данные оркестрационной задачи
      properties: 
        name:
          type: string
          example: tasks.collection_query
        uuid:
          type: string
          format: uuid
        state:
          type: string
          enum:
            - SUCCESS
            - FAILURE
            - PENDING
            - STARTED
            - RETRY
            - REVOKED
        args:
          type: array
        kwargs:
          type: object
          additionalProperties: true
        result:
          type: object
          additionalProperties: true
        received:
          type: string
          format: date-time
        started:
          type: string
          format: date-time
        failed:
          type: string
          format: date-time
        retries:
          type: number
        worker:
          type: string
        exception:
          type: string
          example: TimeoutError('collection_query wait timeout')
        timestamp:
          type: string
          format: date-time
        traceback:
          type: string
          example: |
            Traceback (most recent call last):
              File "/usr/local/lib/python3.12/site-packages/celery/app/trace.py", line 585, in trace_task
                R = retval = fun(*args, **kwargs)
                            ^^^^^^^^^^^^^^^^^^^^
              File "/usr/local/lib/python3.12/site-packages/celery/app/trace.py", line 858, in __protected_call__
                return self.run(*args, **kwargs)
                      ^^^^^^^^^^^^^^^^^^^^^^^^^
              File "/app/src/celery_orchestrator/tasks/definitions.py", line 168, in collection_query
                raise TimeoutError("collection_query wait timeout")
            TimeoutError: collection_query wait timeout
        clock:
          type: number
        root:
          type: string
          example: "<Task: tasks.collection_batch(a4504379-5c23-43c6-99f2-dc361b427928) SUCCESS clock:106>"
        rootId:
          type: string
          example: id	a4504379-5c23-43c6-99f2-dc361b427928
        parent:
          type: string
          example: "<Task: tasks.collection_batch(a4504379-5c23-43c6-99f2-dc361b427928) SUCCESS clock:106>"
        parentId:
          type: string
          example: "id	a4504379-5c23-43c6-99f2-dc361b427928"
        children:
          type: string
      required: 
        - name
        - uuid
        - state
        - args
        - kwargs
        - received
        - started
        - timestamp