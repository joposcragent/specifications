openapi: 3.1.0
info:
  title: Управление вакансиями (job-postings-crud)
  description: |
    REST API сервиса сохранения и поиска карточек вакансий (Joposcragent).
    Ошибки `ResponseStatusException` и необработанные исключения возвращаются с телом `text/plain`.
  version: 1.1.0
servers:
  - url: http://job-postings-crud:8080/
  - url: http://localhost:8080/

paths:
  /job-postings/{jobPostingUuid}:
    get:
      description: Получение вакансии по uuid
      parameters: 
        - $ref: '#/components/parameters/RequiredEntityUuid'
      responses: 
        '200':
          description: Вакансия
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPostingsItem'
        '404':
          description: Вакансия с таким UUID не найдена
          content:
            text/plain:
              schema:
                type: string
              example: "404 NOT_FOUND"
        '500':
          $ref: '#/components/responses/UncaughtException'
    post:
      description: |
        Сохранение новой вакансии. Идентификатор в пути задаёт `uuid` записи в БД;
        поле `uuid` в теле, если передано, должно совпадать с путём (рекомендуется дублировать для единообразия JSON).
      parameters:
        - $ref: '#/components/parameters/RequiredEntityUuid'
        - $ref: '#/components/parameters/CorrelationId'
      requestBody:
        description: Данные вакансии
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobPostingsItemWrite'
      responses:
        '200':
          description: Вакансия создана (тело ответа пустое)
        '409':
          description: Такая вакансия уже есть (по UUID в пути или по uid в теле)
          content:
            text/plain:
              schema:
                type: string
              examples:
                duplicateUid:
                  value: Вакансия с uid 131927888 уже есть в БД
                duplicateUuid:
                  summary: Конфликт по UUID из пути
                  value: Вакансия с uuid 00000000-0000-0000-0000-000000000001 уже есть в БД
        '500':
          $ref: '#/components/responses/UncaughtException'
    patch:
      description: Обновление данных вакансии
      parameters:
        - $ref: '#/components/parameters/RequiredEntityUuid'
      requestBody:
        description: Данные вакансии
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobPostingsItemWrite'
      responses:
        '200':
          description: Вакансия обновлена (тело ответа пустое)
        '404':
          description: Вакансии с таким UUID в базе не найдено
          content:
            text/plain:
              schema:
                type: string
              example: "404 NOT_FOUND"
        '500':
          $ref: '#/components/responses/UncaughtException'
  /job-postings/{jobPostingUuid}/evaluation-status/{status}:
    post:
      description: Изменение статуса оценки вакансии
      parameters:
        - $ref: '#/components/parameters/RequiredEntityUuid'
        - name: status
          in: path
          description: Литерал enum (как в JSON), например `NEW`, `RELEVANT`
          schema:
            $ref: '#/components/schemas/EvaluationStatus'
          required: true
      responses:
        '200':
          description: Статус изменён (тело ответа пустое)
        '400':
          description: Неизвестное значение status
          content:
            text/plain:
              schema:
                type: string
              example: "Unknown evaluation status: INVALID"
        '404':
          description: Вакансия не найдена
          content:
            text/plain:
              schema:
                type: string
              example: "404 NOT_FOUND"
        '500':
          $ref: '#/components/responses/UncaughtException'
  /job-postings/{jobPostingUuid}/response-status/{status}:
    post:
      description: Изменение статуса рассмотрения вакансии
      parameters:
        - $ref: '#/components/parameters/RequiredEntityUuid'
        - name: status
          in: path
          description: Литерал enum (как в JSON)
          schema:
            $ref: '#/components/schemas/ResponseStatus'
          required: true
      responses:
        '200':
          description: Статус изменён (тело ответа пустое)
        '400':
          description: Неизвестное значение status
          content:
            text/plain:
              schema:
                type: string
              example: "Unknown response status: INVALID"
        '404':
          description: Вакансия не найдена
          content:
            text/plain:
              schema:
                type: string
              example: "404 NOT_FOUND"
        '500':
          $ref: '#/components/responses/UncaughtException'
  /job-postings/list:
    get:
      description: |
        Получение списка вакансий по простому отбору. Условия по переданным query-параметрам объединяются по AND.
        Значения `page` и `size` меньше 1 на стороне сервиса приводятся к 1.
      parameters:
        - name: uuid
          description: Внутренний UUID вакансии
          in: query
          schema:
            type: string
            format: uuid
        - name: uid
          description: Внешний uid вакансии
          in: query
          schema:
            type: string
        - name: title
          in: query
          description: Подстрока названия вакансии (SQL `LIKE %title%`)
          schema:
            type: string
        - name: company
          in: query
          description: Подстрока названия компании
          schema:
            type: string
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
      responses:
        '200':
          description: Список вакансий
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPostingsList'
        '404':
          description: Не найдено ни одной вакансии
          content:
            text/plain:
              schema:
                type: string
              example: Не найдено ни одной вакансии
        '500':
          $ref: '#/components/responses/UncaughtException'
  /job-postings/search-query/by-uuids:
    post:
      description: Получение вакансий по списку UUID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UuidsList'
      responses:
        '200':
          description: Список найденных вакансий (порядок не гарантирован)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPostingsList'
        '404':
          description: Не найдено ни одной вакансии (в т.ч. при пустом списке в запросе)
          content:
            text/plain:
              schema:
                type: string
              example: Не найдено ни одной вакансии
        '400':
          description: Не корректный запрос
          content:
            text/plain:
              schema:
                type: string
              example: Массив list не может быть пустым
        '500':
          $ref: '#/components/responses/UncaughtException'
  /job-postings/search-query/non-existent:
    post:
      description: |
        Получение списка внешних uid из запроса, которых ещё нет в БД.
        Если после исключения существующих uid список пуст, возвращается 404.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/JobPostingsUidsList'
      responses:
        '200':
          description: Список uid, отсутствующих в БД (порядок совпадает с запросом)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JobPostingsUidsList'
        '404':
          description: Ни одного «нового» uid (все уже в БД или список в запросе пуст)
          content:
            text/plain:
              schema:
                type: string
              example: Не найдено ни одной вакансии
        '400':
          description: Не корректный запрос
          content:
            text/plain:
              schema:
                type: string
              example: Массив list не может быть пустым
        '500':
          $ref: '#/components/responses/UncaughtException'

components:
  schemas:
    EvaluationStatus:
      description: Этап процесса оценки вакансии
      type: string
      enum:
        - NEW
        - PENDING
        - IRRELEVANT
        - RELEVANT
    ResponseStatus:
      description: Статус рассмотрения вакансии
      type: string
      enum:
        - NEW
        - NOT_INTERESTED
        - RESPONDED
        - REJECTED
    JobPostingsUidsList:
      description: Список внешних uid вакансий
      type: object
      properties:
        list:
          type: array
          items:
            type: string
          example:
            - "131927888"
            - "131927889"
            - "131927812"
          minItems: 1
      required:
        - list
    UuidsList:
      description: Список UUID (строки в формате UUID)
      type: object
      properties:
        list:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
      required:
        - list
    JobPostingsList:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: '#/components/schemas/JobPostingsItem'
      required:
        - list
    JobPostingsItem:
      description: |
        Вакансия в ответах API. Дата публикации в JSON — `date-time`; в БД хранится как дата (календарный день в UTC).
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        uid:
          type: string
          example: "131927888"
        title:
          type: string
          example: Технический директор
        url:
          type: string
          example: https://hh.ru/vacancy/131962084
        company:
          type: string
          example: ООО Криотрейд инжиниринг
        content:
          type: string
        contentVector:
          type: array
          items:
            type: number
          example:
            - -0.03144988417625427
            - 0.03998693823814392
            - -0.05009036511182785
            - 0.00009027662599692121
            - -0.01712440885603428
            - -0.016279764473438263
            - 0.03184894844889641
            - 0.06008609011769295
            - -0.002879486419260502
            - -0.007612203247845173
            - -0.07903512567281723
            - 0.05236726254224777
        evaluationStatus:
          $ref: '#/components/schemas/EvaluationStatus'
        responseStatus:
          $ref: '#/components/schemas/ResponseStatus'
        publicationDate:
          type: string
        createdAt:
          type: string
          format: date-time
          readOnly: true
        updatedAt:
          type: string
          format: date-time
          readOnly: true
      required:
        - uuid
        - uid
        - title
        - url
        - company

    JobPostingsItemWrite:
      description: Должен содержать хотя бы одно поле, отсутствующие поля не обновляются, чтобы удалить значение поля, передать поле с null
      type: object
      properties:
        uid:
          type: string
          example: "131927888"
        title:
          type: string
          example: Технический директор
        url:
          type: string
          example: https://hh.ru/vacancy/131962084
        company:
          type: string
          example: ООО Криотрейд инжиниринг
        content:
          type: string
        contentVector:
          type: array
          items:
            type: number
            format: double
          example:
            - -0.03144988417625427
            - 0.03998693823814392
            - -0.05009036511182785
            - 0.00009027662599692121
            - -0.01712440885603428
            - -0.016279764473438263
            - 0.03184894844889641
            - 0.06008609011769295
            - -0.002879486419260502
            - -0.007612203247845173
            - -0.07903512567281723
            - 0.05236726254224777
        evaluationStatus:
          $ref: '#/components/schemas/EvaluationStatus'
        responseStatus:
          $ref: '#/components/schemas/ResponseStatus'
        publicationDate:
          type: string
          format: date-time
        relevance:
          type: number
          format: double

  parameters:
    CorrelationId:
      description: correlationId асинхронной задачи; если задан, то некоторые эндпоинты должны отправлять события в очередь брокера Celery Orchestrator
      name: X-Joposcragent-correlationId
      in: header
      schema:
        type: string
        format: uuid
      required: false
    RequiredEntityUuid:
      name: jobPostingUuid
      in: path
      description: Внутренний UUID вакансии
      schema:
        type: string
        format: uuid
      required: true
    Size:
      name: size
      in: query
      description: Размер страницы (по умолчанию 20; значения < 1 приводятся к 1)
      schema:
        type: integer
        default: 20
      required: false
    Page:
      name: page
      in: query
      description: Номер страницы (по умолчанию 1; значения < 1 приводятся к 1)
      schema:
        type: integer
        default: 1
      required: false

  responses:
    UncaughtException:
      description: Необработанное исключение
      content:
        text/plain:
          schema:
            type: string
          example: "org.jooq.exception.DataAccessException: connection refused"
