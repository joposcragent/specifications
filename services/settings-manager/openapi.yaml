openapi: 3.1.0
info:
  title: Управление профилем пользователя
  version: 1.2.1
servers:
  - url: http://settings-manager:8080/
  - url: http://localhost:8080/
tags:
  - name: reference-context
    description: Контроллер управления эталонным контекстом
  - name: search-query
    description: Контроллер управления поисковыми запросами
  - name: query-selector
    description: Контроллер настройки CSS-селекторов
  - name: relevance-thresholds
    description: Контроллер настройки порогов релевантности
paths:
  /reference-context:
    get:
      description: Получение эталонного контекста
      tags:
        - reference-context
      responses:
        "200":
          description: Текст эталонного контекста
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceContext"
        "202":
          description: Эталонный контекст не задан
        "500":
          $ref: "#/components/responses/UncaughtException"

    post:
      description: Установка эталонного контекста
      tags:
        - reference-context
      requestBody:
        content:
          text/plain:
            schema:
              type: string
      responses:
        "200":
          description: Эталонный контекст установлен; тело — только вектор и метки времени (без текста)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReferenceContextPersisted"
        "500":
          $ref: "#/components/responses/UncaughtException"

  /search-query/list:
    get:
      tags:
        - search-query
      description: Получение списка настроенных поисковых запросов
      responses:
        "200":
          description: Список запросов
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchQueriesList"
        "500":
          $ref: "#/components/responses/UncaughtException"
  /search-query/{entityUuid}:
    post:
      tags:
        - search-query
      description: Добавление нового поискового запроса
      parameters:
        - $ref: "#/components/parameters/EntityUuid"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchQueryCreateRequest"
            example:
              name: CTO / Tech lead
              query: https://hh.ru/search/vacancy?area=1&items_on_page=20
      responses:
        "409":
          description: Запрос с таким UUID уже есть в базе
        "200":
          description: "Добавление нового поискового запроса"
        "500":
          $ref: "#/components/responses/UncaughtException"
    patch:
      tags:
        - search-query
      description: Обновление поискового запроса
      parameters:
        - $ref: "#/components/parameters/EntityUuid"
      requestBody:
        required: true
        description: >
          Частичное обновление: допустимо указать только `query`, только `name` или оба поля;
          пустое тело или объект без ни одного из полей — ошибка клиента.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchQueryPatchRequest"
            example:
              query: https://hh.ru/search/vacancy?area=1
      responses:
        "404":
          description: Запрос с таким entityUuid не найден
        "400":
          description: Не передано ни query, ни name для обновления
        "200":
          description: "Обновлен успешно"
    delete:
      tags:
        - search-query
      description: Удаление поискового запроса
      parameters:
        - $ref: "#/components/parameters/EntityUuid"
      responses:
        "404":
          description: Запрос с таким entityUuid не найден
        "200":
          description: "Удален успешно"
    get:
      tags:
        - search-query
      description: Получение поискового запроса
      parameters:
        - $ref: "#/components/parameters/EntityUuid"
      responses:
        "404":
          description: Запрос с таким entityUuid не найден
        "200":
          description: "URL поискового запроса"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SearchQueriesItem"

  /relevance-thresholds/list:
    get:
      description: Получить все пороги релевантности
      tags:
        - relevance-thresholds
      responses:
        "200":
          description: Список порого релевантности
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelevanceThresholdsList"
        "500":
          $ref: "#/components/responses/UncaughtException"
  /relevance-thresholds/{type}:
    get:
      description: Получить порог релевантности конкретного типа
      tags:
        - relevance-thresholds
      parameters:
        - $ref: "#/components/parameters/RelevanceThresholdType"
      responses:
        "200":
          description: Порог релавнтности
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RelevanceThresholdItem"
        "500":
          $ref: "#/components/responses/UncaughtException"

    post:
      description: Установить порог релевантности конкретного типа
      tags:
        - relevance-thresholds
      parameters:
        - $ref: "#/components/parameters/RelevanceThresholdType"
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                value:
                  type: number
                  minimum: 0
                  maximum: 1
                  description: Порог в шкале косинусного сходства (0–1), не проценты
                  example: 0.81946951150894038
              required:
                - value
      responses:
        "200":
          description: Порог релевантности установлен
        "500":
          $ref: "#/components/responses/UncaughtException"

components:
  schemas:
    ReferenceContext:
      type: object
      properties:
        context:
          type: string
        vector:
          type: array
          items:
            type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - context
        - vector
        - createdAt
    ReferenceContextPersisted:
      type: object
      description: Результат успешного POST /reference-context (без поля context)
      properties:
        vector:
          type: array
          items:
            type: number
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - vector
        - createdAt
    SearchQueriesList:
      type: array
      items:
        $ref: "#/components/schemas/SearchQueriesItem"
    SearchQueriesItem:
      type: object
      properties:
        uuid:
          type: string
          format: uuid
        name:
          type: string
          maxLength: 512
        query:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - uuid
        - name
        - query
    SearchQueryCreateRequest:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 512
        query:
          type: string
          minLength: 1
      required:
        - name
        - query
    SearchQueryPatchRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 512
        query:
          type: string
          minLength: 1
    RelevanceThresholdsList:
      type: object
      properties:
        list:
          type: array
          items:
            $ref: "#/components/schemas/RelevanceThresholdItem"
      required:
        - list
    RelevanceThresholdType:
      type: string
      enum:
        - CONTENT
        - NOTIFICATION
    RelevanceThresholdItem:
      type: object
      properties:
        value:
          type: number
          minimum: 0
          maximum: 1
          description: Порог в шкале косинусного сходства (0–1), не проценты
          example: 0.81946951150894038
        type:
          $ref: "#/components/schemas/RelevanceThresholdType"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - value
        - type
  parameters:
    RelevanceThresholdType:
      name: type
      in: path
      schema:
        $ref: "#/components/schemas/RelevanceThresholdType"
      required: true
    EntityUuid:
      name: entityUuid
      in: path
      schema:
        type: string
        format: uuid
      required: true
  responses:
    UncaughtException:
      description: Неизвестная ошибка
      content:
        text/plain:
          schema:
            type: string
          example: |
            2020-12-04 15:03:12.926 ERROR 80850 --- [         task-1] .a.i.SimpleAsyncUncaughtExceptionHandler : Unexpected exception occurred invoking async method: public void com.yawintutor.TestService.print(int)
                java.lang.ArithmeticException: / by zero
                  at com.yawintutor.TestService.print(TestService.java:15) ~[classes/:na]
                  at com.yawintutor.TestService$$FastClassBySpringCGLIB$$284b10a4.invoke(<generated>) ~[classes/:na]
                  at org.springframework.cglib.proxy.MethodProxy.invoke(MethodProxy.java:218) ~[spring-core-5.3.1.jar:5.3.1]
                  at org.springframework.aop.framework.CglibAopProxy$CglibMethodInvocation.invokeJoinpoint(CglibAopProxy.java:771) ~[spring-aop-5.3.1.jar:5.3.1]
                  at org.springframework.aop.framework.ReflectiveMethodInvocation.proceed(ReflectiveMethodInvocation.java:163) ~[spring-aop-5.3.1.jar:5.3.1]
                  at org.springframework.aop.framework.CglibAopProxy$CglibMethodInvocation.proceed(CglibAopProxy.java:749) ~[spring-aop-5.3.1.jar:5.3.1]
                  at org.springframework.aop.interceptor.AsyncExecutionInterceptor.lambda$invoke$0(AsyncExecutionInterceptor.java:115) ~[spring-aop-5.3.1.jar:5.3.1]
                  at java.util.concurrent.FutureTask.run(FutureTask.java:266) ~[na:1.8.0_101]
                  at java.util.concurrent.ThreadPoolExecutor.runWorker(ThreadPoolExecutor.java:1142) ~[na:1.8.0_101]
                  at java.util.concurrent.ThreadPoolExecutor$Worker.run(ThreadPoolExecutor.java:617) ~[na:1.8.0_101]
                  at java.lang.Thread.run(Thread.java:745) ~[na:1.8.0_101]
