openapi: 3.1.0
info:
  title: Управление профилем пользователя
  version: 1.0.0
servers:
  - url: http://user-profile-manager:8080/
tags:
  - name: reference-context
    description: Контроллер управления эталонным контекстом
  - name: search-query
    description: Контроллер управления поисковыми запросами
  - name: query-selector
    description: Контроллер настройки CSS-селекторов
  - name: relevance-thresholds
    description: Контроллер настройки порогов релевантности
paths:
  /reference-context:
    get:
      description: Получение эталонного контекста
      tags:
        - reference-context
      responses: 
        '200':
          description: Текст эталонного контекста
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/ReferenceContext'
        '202':
          description: Эталонный контекст не задан

    post:
      description: Установка эталонного контекста
      tags:
        - reference-context
      requestBody: 
        content: 
          text/plain:
            schema:
              type: string
      responses: 
        '202':
          description: Эталонный контекст установлен

  /search-query/list:
    get:
      tags: 
        - search-query
      description: Получение списка настроенных поисковых запросов
      responses:
        '200':
          description: Список запросов
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SearchQueriesList'
  /search-query/{entityUuid}:
    post:
      tags: 
        - search-query
      description: Добавление нового поискового запроса
      parameters:
        - $ref: '#/components/parameters/EntityUuid'
      requestBody: 
        content: 
          text/plain:
            schema:
              type: string
            
      responses:
        '409':
            description: Запрос с таким UUID уже есть в базе
        '200':
          description: 'Добавление нового поискового запроса'
    patch:
      tags: 
        - search-query
      description: Обновление поискового запроса
      parameters:
        - $ref: '#/components/parameters/EntityUuid'
      requestBody: 
        description: Новый URL поискового запроса
        content: 
          text/plain:
            schema:
              type: string 
            example: https://hh.ru/search/vacancy?area=1&items_on_page=20&no_magic=true&order_by=publication_time&ored_clusters=true&professional_role=156&professional_role=160&professional_role=165&professional_role=36&professional_role=73&professional_role=96&professional_role=164&professional_role=104&professional_role=157&professional_role=112&professional_role=113&professional_role=148&professional_role=114&professional_role=124&professional_role=125&professional_role=126&search_field=name&text=%28CTO+OR+%22%D1%80%D1%83%D0%BA%D0%BE%D0%B2%D0%BE%D0%B4%D0%B8%D1%82%D0%B5%D0%BB%D1%8C+%D1%80%D0%B0%D0%B7%D1%80%D0%B0%D0%B1%D0%BE%D1%82%D0%BA%D0%B8%22+OR+%22%D1%82%D0%B5%D1%85%D0%BD%D0%B8%D1%87%D0%B5%D1%81%D0%BA%D0%B8%D0%B9+%D0%B4%D0%B8%D1%80%D0%B5%D0%BA%D1%82%D0%BE%D1%80%22+OR+%22chef+technical+oficer%22+OR+%22%D1%82%D0%B5%D1%85*%D0%BB%D0%B8%D0%B4%22+OR+%22tech*lead%22%29+AND+NOT%28teamlead+OR+%D1%82%D0%B8%D0%BC%D0%BB%D0%B8%D0%B4+OR+%22%D1%80%D1%83%D0%BA%D0%BE%D0%B2%D0%BE%D0%B4%D0%B8%D1%82%D0%B5%D0%BB%D1%8C+%D0%BA%D0%BE%D0%BC%D0%B0%D0%BD%D0%B4%D1%8B%22%29&search_period=1
      responses:
        '404':
          description: Запрос с таким entityUuid не найден
        '200':
          description: 'Обновлен успешно'
    delete:
      tags: 
        - search-query
      description: Удаление поискового запроса
      parameters:
        - $ref: '#/components/parameters/EntityUuid'
      responses:
        '404':
          description: Запрос с таким entityUuid не найден
        '200':
          description: 'Удален успешно'
    get:
      tags: 
        - search-query
      description: Получение поискового запроса
      parameters:
        - $ref: '#/components/parameters/EntityUuid'
      responses:
        '404':
          description: Запрос с таким entityUuid не найден
        '200':
          description: 'URL поискового запроса'
          content: 
            application/json:
              schema:
                $ref: '#/components/schemas/SearchQueriesItem'
  
  /query-selector/list:
    get:
      description: Получение списка CSS-селекторов
      tags:
        - query-selector
      responses: 
        '200':
          description: Список установленных селекторов
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/CssQuerySelectorsList'
  /query-selector/{selectorType}:
    get:
      description: Получение селектора
      tags:
        - query-selector
      parameters: 
        - $ref: '#/components/parameters/SelectorType'
      responses: 
        '200':
          description: CSS-селектор
          content: 
            text/plain:
              schema:
                type: string
    post:
      description: Установка селектора
      tags:
        - query-selector
      parameters: 
        - $ref: '#/components/parameters/SelectorType'
      requestBody: 
        content: 
          text/plain:
            schema:
              type: string
      responses: 
        '200':
          description: CSS-селектор установлен
    delete:
      description: Очистка селектора
      tags:
        - query-selector
      parameters: 
        - $ref: '#/components/parameters/SelectorType'
      responses: 
        '200':
          description: CSS-селектор удален

  /relevance-thresholds/list:
    get:
      description: Получить все пороги релевантности
      tags: 
        - relevance-thresholds
      responses: 
        '200':
          description: Список порого релевантности
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/RelevenceThresholdsList'
        '500':
          description: Неизвестная ошибка
          content: 
            text/plain:
              schema:
                type: string
  /relevance-thresholds/{type}:
    get:
      description: Получить порог релевантности конкретного типа
      tags: 
        - relevance-thresholds
      parameters: 
        - $ref: '#/components/parameters/RelevaneThresholdType'
      responses: 
        '200':
          description: Порог релавнтности
          content: 
            application/json: 
              schema: 
                $ref: '#/components/schemas/RelevenceThresholdValue'
        '500':
          description: Неизвестная ошибка
          content: 
            text/plain:
              schema:
                type: string
    post:  
      description: Установить порог релевантности конкретного типа
      tags: 
        - relevance-thresholds
      parameters: 
        - $ref: '#/components/parameters/RelevaneThresholdType'
      requestBody: 
        content: 
          application/json:
            schema: 
              type: object
              properties: 
                value:
                  type: number
                  example: 0.81946951150894038
              required: 
                - value
      responses: 
        '200':
          description: Порог релавнтности установлен
        '500':
          description: Неизвестная ошибка
          content: 
            text/plain:
              schema:
                type: string
components:
  schemas:
    ReferenceContext:
      type: object
      properties: 
        context:
          type: string
        vector:
          type: array
          items: 
            type: number
    SearchQueriesList:
      type: array
      items: 
        $ref: '#/components/schemas/SearchQueriesItem'
    SearchQueriesItem:
      type: object
      properties: 
        uuid:
          type: string
          format: uuid
        query:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required:
        - uuid
        - query
    CssQuerySelectorsList:
      type: object
      properties: 
        list:
          type: array
          items:
            $ref: '#/components/schemas/CssQuerySelectorsListItem'
    CssQuerySelectorsListItem:
      type: object
      properties: 
        selector:
          type: string
        type:
          $ref: '#/components/schemas/CssQuerySelectorType'
    CssQuerySelectorType:
      type: string
      enum:
        - JOB_POSTING_LIST_CARDS
        - JOB_POSTING_LIST_CARD_TITLE
        - JOB_POSTING_LIST_CARD_CONTENT_LINK
        - JOB_POSTING_LIST_PAGES_LINKS
        - JOB_POSTING_CARD_CONTENT
    RelevenceThresholdsList:
      type: object
      properties: 
        list:
          $ref: '#/components/schemas/RelevenceThresholdsListItem'
      required: 
        - list
    RelevenceThresholdsListItem:
      type: object
      properties: 
        type:
          $ref: '#/components/schemas/RelevenceThresholdType'
        value:
          type: number
          example: 0.81946951150894038
    RelevenceThresholdType:
      type: string
      enum: 
        - TITLE
        - GENERAL
        - NOTIFICATION
    RelevenceThresholdValue:
      type: object
      properties: 
        value:
          type: number
          example: 0.81946951150894038
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
  parameters:
    RelevaneThresholdType:
      name: type
      in: path
      schema: 
        $ref: '#/components/schemas/RelevenceThresholdType'
      required: true
    SelectorType:
      name: selectorType
      in: path
      schema:
        $ref: '#/components/schemas/CssQuerySelectorType'
      required: true
    EntityUuid:
      name: entityUuid
      in: path
      schema:
        type: string
        format: uuid
      required: true